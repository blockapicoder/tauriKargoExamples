<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TS -> IHM (sans JSON visible)</title>

  <style>
    :root {
      --bg: #0b0f17;
      --panel: #111827;
      --ink: #e5e7eb;
      --muted: #9ca3af;
      --line: #1f2937;
      --bad: #ef4444;
      --ok: #22c55e;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .bar {
      display: flex;
      gap: .5rem;
      align-items: center;
      padding: .75rem;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      background: rgba(11, 15, 23, .95);
      backdrop-filter: blur(6px);
      z-index: 10;
      flex-wrap: wrap;
    }

    .bar>* {
      font-size: 14px;
    }

    button,
    select,
    label.chk {
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: .5rem .75rem;
      cursor: pointer;
    }

    button:hover,
    select:hover {
      border-color: #374151;
    }

    button.primary {
      border-color: #334155;
    }

    button.active {
      border-color: #64748b;
      box-shadow: inset 0 0 0 1px #64748b;
    }

    .hint {
      color: var(--muted);
    }

    input[type="file"] {
      display: none;
    }

    .pill {
      padding: .2rem .5rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .wrap {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      min-height: 0;
    }

    .col:last-child {
      border-right: none;
    }

    .title {
      padding: .5rem .75rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      letter-spacing: .02em;
    }

    #tsEditor {
      flex: 1;
      min-height: 220px;
    }

    #formHost {
      flex: 1;
      overflow: auto;
      padding: .75rem;
      background: #0b1220;
      min-height: 0;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding: .6rem .75rem;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .status {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6b7280;
      display: inline-block;
    }

    .dot.ok {
      background: var(--ok);
    }

    .dot.bad {
      background: var(--bad);
    }

    #errors {
      white-space: pre-wrap;
      margin: 0;
      color: #fca5a5;
      max-height: 140px;
      overflow: auto;
      flex: 1;
      min-width: 320px;
    }

    /* Form widgets */
    .grp {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: .6rem .6rem .3rem;
      margin: .5rem 0;
      background: rgba(17, 24, 39, .35);
    }

    .grpHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      margin-bottom: .4rem;
      flex-wrap: wrap;
    }

    .grpTitle {
      font-size: 13px;
      color: var(--ink);
    }

    .row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: .5rem;
      align-items: center;
      margin: .35rem 0;
    }

    .lbl {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ctl {
      display: flex;
      gap: .5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .inp,
    .sel {
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: .45rem .55rem;
      width: min(520px, 100%);
      box-sizing: border-box;
      font-size: 13px;
    }

    .btnSm {
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: .35rem .55rem;
      cursor: pointer;
      font-size: 12px;
    }

    .btnSm:hover {
      border-color: #374151;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    /* Modes (un seul panel visible) */
    body.mode-ts .wrap {
      grid-template-columns: 1fr;
    }

    body.mode-ts .col.form {
      display: none;
    }

    body.mode-form .wrap {
      grid-template-columns: 1fr;
    }

    body.mode-form .col.ts {
      display: none;
    }

    @media (max-width: 980px) {
      .row {
        grid-template-columns: 1fr;
      }

      .lbl {
        white-space: normal;
      }
    }
  </style>

  <!-- Monaco loader -->
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <!-- TypeScript compiler API (global "ts") -->
  <script src="https://unpkg.com/typescript@5.4.5/lib/typescript.js"></script>
</head>

<body class="mode-ts">
  <div class="bar">
    <span class="pill">Vue</span>
    <button id="btnViewTs" class="primary active">TypeScript</button>
    <button id="btnViewForm" class="primary">IHM</button>

    <span class="pill">TS</span>
    <button id="btnLoadTs">Charger TS…</button>
    <input id="fileTs" type="file" accept=".ts,.tsx,text/typescript" />
    <button id="btnSaveTs">Enregistrer TS</button>

    <span class="pill">Type racine</span>
    <select id="typeSelect"></select>
    <!--
    <label class="chk" title="Influe sur les valeurs par défaut ajoutées (optionnels, union, array item)">
      <input id="includeOptional" type="checkbox" style="vertical-align:middle;margin-right:.35rem" />
      inclure optionnels
    </label>
-->
    <span class="pill">JSON</span>
    <button id="btnLoadJson">Charger JSON…</button>
    <input id="fileJson" type="file" accept=".json,application/json" />
    <button id="btnSaveJson">Enregistrer JSON</button>
    <button id="btnValidate">Valider</button>

    <span class="hint">IHM régénérée automatiquement dès que le TS change.</span>
  </div>

  <div class="wrap">
    <div class="col ts">
      <div class="title">TypeScript</div>
      <div id="tsEditor"></div>
      <div class="bottom">
        <div class="status"><span id="tsDot" class="dot"></span><span id="tsStatus">Analyse TS…</span></div>
        <pre id="errors"></pre>
      </div>
    </div>

    <div class="col form">
      <div class="title">IHM (édition de l’objet)</div>
      <div id="formHost"></div>
      <div class="bottom">
        <div class="status"><span id="jsonDot" class="dot"></span><span id="jsonStatus">—</span></div>
        <div class="hint">Le JSON n’est pas affiché, seulement import/export.</div>
      </div>
    </div>
  </div>

  <script src="./app.ts"></script>
</body>

</html>
